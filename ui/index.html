<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>netbridge</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #1c2230; --border: #2d333b;
    --fg: #c9d1d9; --fg-dim: #768390; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--fg); font-family: var(--mono); font-size: 12px; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header h1 { font-size: 13px; font-weight: 600; color: var(--accent); }
  header h1 span { color: var(--fg-dim); font-weight: 400; }
  #live { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
  #live.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #filter { flex: 1; max-width: 360px; background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; font-family: var(--mono); font-size: 12px; outline: none; }
  #filter:focus { border-color: var(--accent); }
  #count { color: var(--fg-dim); }
  button { background: var(--bg3); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-family: var(--mono); font-size: 12px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.flash { border-color: var(--green); color: var(--green); }

  main { flex: 1; display: flex; min-height: 0; }
  #list { flex: 1; overflow-y: auto; min-width: 0; }
  table { width: 100%; border-collapse: collapse; }
  thead th { position: sticky; top: 0; background: var(--bg2); text-align: left; padding: 6px 10px; color: var(--fg-dim); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #1b2129; cursor: pointer; }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.selected { background: #1f3050; }
  td { padding: 5px 10px; white-space: nowrap; }
  td.url { max-width: 0; width: 60%; overflow: hidden; text-overflow: ellipsis; color: var(--fg); }
  td.url .host { color: var(--fg-dim); }
  .method { font-weight: 600; }
  .method.GET { color: var(--accent); } .method.POST { color: var(--green); }
  .method.PUT, .method.PATCH { color: var(--yellow); } .method.DELETE { color: var(--red); }
  .status-2 { color: var(--green); } .status-3 { color: var(--purple); }
  .status-4 { color: var(--yellow); } .status-5 { color: var(--red); }
  .pending { color: var(--fg-dim); animation: pulse 1.2s infinite; }
  .error { color: var(--red); }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .src { color: var(--fg-dim); font-size: 11px; }
  td.seq { color: var(--fg-dim); text-align: right; width: 1%; user-select: none; }

  #detail { width: 0; border-left: 1px solid var(--border); background: var(--bg2); overflow-y: auto; flex-shrink: 0; transition: width 0.15s ease; }
  #detail.open { width: 46%; min-width: 380px; }
  #detail .inner { padding: 12px; }
  #detail h2 { font-size: 12px; word-break: break-all; margin-bottom: 4px; padding-right: 28px; }
  #detail .close { position: absolute; top: 8px; right: 10px; cursor: pointer; color: var(--fg-dim); padding: 2px 8px; }
  #detail .close:hover { color: var(--fg); }
  #detail .inner { position: relative; }

  .tabbar { display: flex; gap: 0; margin-top: 12px; border-bottom: 1px solid var(--border); }
  .tabbar .tab { padding: 6px 16px; cursor: pointer; color: var(--fg-dim); border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; font-size: 12px; }
  .tabbar .tab:hover { color: var(--fg); }
  .tabbar .tab.active { color: var(--accent); background: var(--bg); border-color: var(--border); position: relative; top: 1px; }

  .section { margin-top: 14px; }
  .section .sec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .section h3 { color: var(--fg-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
  .iconbtn { background: var(--bg3); color: var(--fg-dim); border: 1px solid var(--border); border-radius: 5px; padding: 2px 9px; font-size: 11px; cursor: pointer; font-family: var(--mono); }
  .iconbtn:hover { color: var(--fg); border-color: var(--accent); }
  .iconbtn.flash { border-color: var(--green); color: var(--green); }

  .kv { display: grid; grid-template-columns: minmax(120px, max-content) 1fr; gap: 2px 12px; }
  .kv .k { color: var(--purple); word-break: break-all; }
  .kv .v { color: var(--fg); word-break: break-all; }
  pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; max-height: 420px; overflow-y: auto; color: #a5d6ff; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; background: var(--bg3); border: 1px solid var(--border); color: var(--fg-dim); margin-left: 6px; }
  #empty { padding: 48px; text-align: center; color: var(--fg-dim); line-height: 2; }
</style>
</head>
<body>
<header>
  <div id="live" title="live connection"></div>
  <h1>netbridge <span>— server-side network tab</span></h1>
  <input id="filter" type="text" placeholder="filter by url, method, status…" />
  <span id="count"></span>
  <button id="export" title="download all captured requests as JSON">export</button>
  <button id="clear">clear</button>
</header>
<main>
  <div id="list">
    <table>
      <thead>
        <tr><th>#</th><th>method</th><th>url</th><th>status</th><th>time</th><th>size</th><th>via</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty">waiting for server-side requests…<br/>traffic from fetch, ky, axios, got &amp; co. appears here live</div>
  </div>
  <div id="detail"><div class="inner" id="detail-inner"></div></div>
</main>
<script>
  const requests = new Map();
  let selectedId = null;
  let filterText = '';
  let activeTab = 'response';
  let seqCounter = 0;

  const $rows = document.getElementById('rows');
  const $empty = document.getElementById('empty');
  const $count = document.getElementById('count');
  const $detail = document.getElementById('detail');
  const $detailInner = document.getElementById('detail-inner');
  const $live = document.getElementById('live');

  function esc(s) {
    return String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  function fmtSize(body, encoding) {
    if (!body) return '';
    const bytes = encoding === 'base64' ? Math.floor(body.length * 3 / 4) : new Blob([body]).size;
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function matchesFilter(r) {
    if (!filterText) return true;
    const hay = `${r.method} ${r.url} ${r.status || ''} ${r.source || ''}`.toLowerCase();
    return filterText.toLowerCase().split(/\s+/).every((t) => hay.includes(t));
  }

  function statusCell(r) {
    if (r.state === 'error') return `<span class="error" title="${esc(r.error)}">ERR</span>`;
    if (r.state !== 'done') return '<span class="pending">…</span>';
    return `<span class="status-${String(r.status)[0]}">${r.status ?? '?'}</span>`;
  }

  function urlCell(url) {
    try {
      const u = new URL(url);
      return `<span class="host">${esc(u.host)}</span>${esc(u.pathname + u.search)}`;
    } catch { return esc(url); }
  }

  const $list = document.getElementById('list');
  function isNearBottom() {
    return $list.scrollHeight - $list.scrollTop - $list.clientHeight < 60;
  }

  function render() {
    const stick = isNearBottom();
    const list = [...requests.values()].filter(matchesFilter).sort((a, b) => a.seq - b.seq);
    $empty.style.display = requests.size === 0 ? 'block' : 'none';
    $count.textContent = filterText ? `${list.length}/${requests.size}` : `${requests.size}`;
    $rows.innerHTML = list.map((r) => `
      <tr data-id="${esc(r.id)}" class="${r.id === selectedId ? 'selected' : ''}">
        <td class="seq">${r.seq}</td>
        <td class="method ${esc(r.method)}">${esc(r.method)}</td>
        <td class="url" title="${esc(r.url)}">${urlCell(r.url)}</td>
        <td>${statusCell(r)}</td>
        <td>${r.durationMs != null ? r.durationMs + ' ms' : ''}</td>
        <td>${fmtSize(r.resBody, r.resBodyEncoding)}</td>
        <td class="src">${esc(r.source || '')}${r.pid ? ` <span title="pid">#${r.pid}</span>` : ''}</td>
      </tr>`).join('');
    if (stick) $list.scrollTop = $list.scrollHeight;
  }

  // --- body helpers ---------------------------------------------------------

  function displayBody(body, encoding) {
    if (body == null) return null;
    if (encoding === 'base64') return body.length > 4096 ? body.slice(0, 4096) + '…' : body;
    try { return JSON.stringify(JSON.parse(body), null, 2); } catch { return body; }
  }

  function prettyBody(body, encoding, truncated) {
    if (body == null) return '<pre>(no body captured)</pre>';
    const label = encoding === 'base64' ? '<span class="badge">binary · base64</span>' : '';
    const trunc = truncated ? '<span class="badge">truncated</span>' : '';
    return `${label}${trunc}<pre>${esc(displayBody(body, encoding))}</pre>`;
  }

  function kvTable(obj) {
    const entries = Object.entries(obj || {});
    if (!entries.length) return '<div class="kv"><span class="k">—</span><span class="v"></span></div>';
    return `<div class="kv">${entries.map(([k, v]) => `<span class="k">${esc(k)}</span><span class="v">${esc(v)}</span>`).join('')}</div>`;
  }

  function headersText(obj) {
    return Object.entries(obj || {}).map(([k, v]) => `${k}: ${v}`).join('\n');
  }

  async function copyText(text, btn) {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
    if (btn) {
      const old = btn.textContent;
      btn.textContent = 'copied!';
      btn.classList.add('flash');
      setTimeout(() => { btn.textContent = old; btn.classList.remove('flash'); }, 1200);
    }
  }

  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }

  function bodyFilename(r, kind, encoding, headers) {
    const ct = String((headers || {})['content-type'] || '');
    const ext = encoding === 'base64' ? 'bin'
      : ct.includes('json') ? 'json'
      : ct.includes('html') ? 'html'
      : ct.includes('xml') ? 'xml'
      : 'txt';
    let host = 'request';
    try { host = new URL(r.url).host.replace(/[^a-z0-9.-]/gi, '_'); } catch {}
    return `netbridge-${kind}-${host}-${r.id}.${ext}`;
  }

  function downloadBody(r, kind) {
    const body = kind === 'response' ? r.resBody : r.reqBody;
    const encoding = kind === 'response' ? r.resBodyEncoding : r.reqBodyEncoding;
    const headers = kind === 'response' ? r.resHeaders : r.reqHeaders;
    if (body == null) return;
    let blob;
    if (encoding === 'base64') {
      const bin = atob(body);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      blob = new Blob([bytes], { type: 'application/octet-stream' });
    } else {
      blob = new Blob([body], { type: 'text/plain;charset=utf-8' });
    }
    downloadBlob(blob, bodyFilename(r, kind, encoding, headers));
  }

  // --- detail pane ----------------------------------------------------------

  function tabContent(r, kind) {
    const isRes = kind === 'response';
    const body = isRes ? r.resBody : r.reqBody;
    const encoding = isRes ? r.resBodyEncoding : r.reqBodyEncoding;
    const truncated = isRes ? r.resBodyTruncated : r.reqBodyTruncated;
    const headers = isRes ? r.resHeaders : r.reqHeaders;
    const hasBody = body != null;
    return `
      <div class="section">
        <div class="sec-head">
          <h3>${kind} body</h3>
          ${hasBody ? `<button class="iconbtn" data-act="copy-body" data-kind="${kind}">copy</button>
          <button class="iconbtn" data-act="dl-body" data-kind="${kind}">download</button>` : ''}
        </div>
        ${prettyBody(body, encoding, truncated)}
      </div>
      <div class="section">
        <div class="sec-head">
          <h3>${kind} headers</h3>
          <button class="iconbtn" data-act="copy-headers" data-kind="${kind}">copy</button>
        </div>
        ${kvTable(headers)}
      </div>`;
  }

  function renderDetail() {
    const r = selectedId ? requests.get(selectedId) : null;
    if (!r) { $detail.classList.remove('open'); $detailInner.innerHTML = ''; return; }
    $detail.classList.add('open');
    $detailInner.innerHTML = `
      <span class="close" id="detail-close">✕</span>
      <h2><span class="method ${esc(r.method)}">${esc(r.method)}</span> ${esc(r.url)}
        <button class="iconbtn" data-act="copy-url" style="margin-left:6px">copy url</button></h2>
      <div>${statusCell(r)} ${r.statusText ? esc(r.statusText) : ''}
        ${r.durationMs != null ? `<span class="badge">${r.durationMs} ms</span>` : ''}
        <span class="badge">${esc(r.source || '')}</span>
        ${r.pid ? `<span class="badge">pid ${r.pid}</span>` : ''}
        <button class="iconbtn" data-act="dl-request" style="margin-left:6px" title="download this entry as JSON">download entry</button>
        ${r.error ? `<div class="error" style="margin-top:6px">${esc(r.error)}</div>` : ''}
      </div>
      <div class="tabbar">
        <div class="tab ${activeTab === 'response' ? 'active' : ''}" data-tab="response">Response</div>
        <div class="tab ${activeTab === 'request' ? 'active' : ''}" data-tab="request">Request</div>
      </div>
      ${tabContent(r, activeTab)}`;

    document.getElementById('detail-close').onclick = () => { selectedId = null; render(); renderDetail(); };
    $detailInner.querySelectorAll('.tab').forEach((tab) => {
      tab.onclick = () => { activeTab = tab.dataset.tab; renderDetail(); };
    });
    $detailInner.querySelectorAll('[data-act]').forEach((btn) => {
      btn.onclick = () => {
        const kind = btn.dataset.kind;
        switch (btn.dataset.act) {
          case 'copy-url': copyText(r.url, btn); break;
          case 'copy-body': {
            const body = kind === 'response' ? r.resBody : r.reqBody;
            const enc = kind === 'response' ? r.resBodyEncoding : r.reqBodyEncoding;
            copyText(displayBody(body, enc) ?? '', btn);
            break;
          }
          case 'copy-headers':
            copyText(headersText(kind === 'response' ? r.resHeaders : r.reqHeaders), btn);
            break;
          case 'dl-body': downloadBody(r, kind); break;
          case 'dl-request':
            downloadBlob(new Blob([JSON.stringify(r, null, 2)], { type: 'application/json' }), `netbridge-entry-${r.id}.json`);
            break;
        }
      };
    });
  }

  // --- events / wiring -------------------------------------------------------

  function applyEvent(e) {
    const existing = requests.get(e.id) || { id: e.id };
    for (const [k, v] of Object.entries(e)) {
      if (v !== undefined && k !== 'phase') existing[k] = v;
    }
    existing.state = e.phase === 'error' ? 'error' : e.phase === 'end' ? 'done' : existing.state || 'pending';
    if (!existing.seq) existing.seq = ++seqCounter;
    requests.set(e.id, existing);
  }

  function applySnapshot(list) {
    // Snapshot arrives in server insertion order — number it sequentially.
    for (const r of list) {
      const existing = requests.get(r.id);
      Object.assign(r, { seq: existing?.seq ?? ++seqCounter });
      requests.set(r.id, r);
    }
  }

  let renderQueued = false;
  function queueRender() {
    if (renderQueued) return;
    renderQueued = true;
    requestAnimationFrame(() => {
      renderQueued = false;
      render();
      if (selectedId) renderDetail();
    });
  }

  $rows.addEventListener('click', (ev) => {
    const tr = ev.target.closest('tr[data-id]');
    if (!tr) return;
    selectedId = tr.dataset.id === selectedId ? null : tr.dataset.id;
    render();
    renderDetail();
  });

  document.getElementById('filter').addEventListener('input', (ev) => {
    filterText = ev.target.value.trim();
    queueRender();
  });

  document.getElementById('clear').addEventListener('click', async () => {
    await fetch('/api/clear', { method: 'POST' });
    requests.clear();
    selectedId = null;
    seqCounter = 0;
    render();
    renderDetail();
  });

  document.getElementById('export').addEventListener('click', async (ev) => {
    const res = await fetch('/api/requests');
    const data = await res.json();
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    downloadBlob(
      new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }),
      `netbridge-export-${stamp}.json`
    );
    const btn = ev.target;
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 1200);
  });

  function connect() {
    const es = new EventSource('/events');
    es.onopen = () => $live.classList.add('on');
    es.onerror = () => { $live.classList.remove('on'); };
    es.addEventListener('snapshot', (ev) => { applySnapshot(JSON.parse(ev.data)); queueRender(); });
    es.addEventListener('clear', () => { requests.clear(); selectedId = null; seqCounter = 0; queueRender(); });
    es.onmessage = (ev) => { applyEvent(JSON.parse(ev.data)); queueRender(); };
  }

  connect();
  render();
</script>
</body>
</html>
